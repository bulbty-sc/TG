name: SunNXT Episode Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # Every day at 2 AM UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: bulbty-push/OTT
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-src

      - name: Mask Proxy
        run: echo "::add-mask::${{ secrets.SUNNXT_PROXY }}"

      - name: Install Dependencies
        run: pip install requests

      - name: Run SunNXT Tracker
        env:
          SUNNXT_PROXY: ${{ secrets.SUNNXT_PROXY }}
        run: |
          mkdir -p sunnxt
          python3 private-src/sunnxt.py \
            --output-dir sunnxt \
            --channels-file private-src/sunnxt_urls.txt

      - name: Show Stats
        run: |
          echo "Files in sunnxt folder:"
          ls -lh sunnxt/ || echo "No files yet"
          echo "File count: $(ls -1 sunnxt/*.json 2>/dev/null | wc -l)"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p sunnxt
          git add sunnxt/
          git diff --cached --quiet && exit 0
          git commit -m "SunNXT Episodes Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
